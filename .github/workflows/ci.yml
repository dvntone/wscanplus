name: Agent Guarded CI

on:
  pull_request:
  push:
    branches-ignore:
      - main  # Prevents direct push to main. Only PR builds allowed.

permissions:
  contents: read
  security-events: write

jobs:
  nodejs:
    name: Node.js (via .nvmrc preferred, fallback 22.x)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js from .nvmrc or fallback
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: 'npm'
          check-latest: true

      - name: Show Node Version
        run: node --version

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint || echo '[WARN] Linting failed. Please review logs.'

      - name: Test
        run: npm test || echo '[WARN] Tests failed. Please review logs.'

  android:
    name: Android (JDK 17, Gradle)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: 17

      # Optionally, specify build-tools version here if needed

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Grant execute permission to gradlew
        run: chmod +x ./gradlew

      - name: Android Build (assembleDebug)
        run: ./gradlew assembleDebug

  secret-scan:
    name: GitHub Secret Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run GitHub Advanced Security Secret Scan
        if: github.event_name == 'pull_request'
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: ''      # No SARIF, triggers built-in scanning

      - name: Manual grep for accidental secrets in code (non-blocking)
        run: |
          if grep -rIl --exclude-dir=.git --exclude='.env*' --exclude='secrets.*' -E 'AKIA|AIza|AIzaSy|-----BEGIN|SECRET_KEY|PRIVATE_KEY|PASSWORD|TOKEN' .; then
            echo "Warning: Potential secrets found. Review required."
          else
            echo "No obvious secrets found."
          fi

# Guardrails: No deploy/merge/trigger jobs. No auto pushes. Only triggers on PRs/pushes to feature branches.
# All failures are surfaced for manual (or gated agent) review only.
