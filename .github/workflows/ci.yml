name: Agent Guarded CI

on:
  pull_request:
  push:
    branches-ignore:
      - main  # Prevents direct push to main

permissions:
  contents: read
  security-events: write

jobs:
  nodejs:
    name: Node.js (via .nvmrc preferred, fallback 22.x)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@2ef0dac24cb86bbd6f7c74ac031b5ac2c2089b8c

      - name: Check for Node.js project files
        id: check_nodejs
        run: |
          if [ -f "package.json" ]; then
            echo "has_package_json=true" >> $GITHUB_OUTPUT
          else
            echo "has_package_json=false" >> $GITHUB_OUTPUT
            echo "Skipping Node.js build: no package.json found"
          fi

      - name: Setup Node.js from .nvmrc or fallback
        if: steps.check_nodejs.outputs.has_package_json == 'true'
        uses: actions/setup-node@f7f5c5e565142bd362e52b4e4e7f98ab528cbb31
        with:
          node-version-file: .nvmrc
          cache: 'npm'
          check-latest: true

      - name: Show Node Version
        if: steps.check_nodejs.outputs.has_package_json == 'true'
        run: node --version

      - name: Install dependencies
        if: steps.check_nodejs.outputs.has_package_json == 'true'
        run: npm ci

      - name: Lint
        if: steps.check_nodejs.outputs.has_package_json == 'true'
        run: npm run lint || echo '[WARN] Linting failed. Please review logs.'

      - name: Test
        if: steps.check_nodejs.outputs.has_package_json == 'true'
        run: npm test || echo '[WARN] Tests failed. Please review logs.'

  android:
    name: Android (JDK 17, Gradle)
    if: ${{ hashFiles('**/gradlew') != '' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@2ef0dac24cb86bbd6f7c74ac031b5ac2c2089b8c

      - name: Set up JDK 17
        uses: actions/setup-java@fae39c5442bc39e562b8a980dac6e97be4c3fa60
        with:
          distribution: 'temurin'
          java-version: 17

      - name: Cache Gradle packages
        uses: actions/cache@1e8e4d4b9632b4668ebb0c7fcc9a22b29c997c23
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Grant execute permission to gradlew
        run: chmod +x ./gradlew

      - name: Android Build (assembleDebug)
        run: ./gradlew assembleDebug

  secret-scan:
    name: GitHub Secret Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@2ef0dac24cb86bbd6f7c74ac031b5ac2c2089b8c

      - name: Run GitHub Advanced Security Secret Scan
        if: github.event_name == 'pull_request'
        uses: github/codeql-action/upload-sarif@1b52e9b4256e785cdf0eae30013faa8e3f8c273c
        with:
          sarif_file: ''

      - name: Manual grep for accidental secrets in code (non-blocking)
        run: |
          if grep -rIl --exclude-dir=.git --exclude='.env*' --exclude='secrets.*' -E 'AKIA|AIza|AIzaSy|-----BEGIN|SECRET_KEY|PRIVATE_KEY|PASSWORD|TOKEN' .; then
            echo "Warning: Potential secrets found. Review required."
          else
            echo "No obvious secrets found."
          fi

# Guardrails: No deploy/merge/trigger jobs. No auto pushes. Only triggers on PRs or non-main branch pushes.
# All failures are surfaced for manual or permitted agent review only.
