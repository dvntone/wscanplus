name: wscan+ CI Pipeline

on:
  push:
    branches-ignore:
      - main  # Prevents direct push to main
  pull_request:
    branches: [ "main" ]

# Cancel in-progress runs for the same PR
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write

jobs:
  secrets-scan:
    name: Secret Scanning
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@2ef0dac24cb86bbd6f7c74ac031b5ac2c2089b8c  # v4
        with:
          fetch-depth: 0

      - name: Manual grep for accidental secrets (non-blocking)
        run: |
          if grep -rIl --exclude-dir=.git --exclude='.env*' --exclude='secrets.*' -E 'AKIA|AIza|AIzaSy|-----BEGIN|SECRET_KEY|PRIVATE_KEY|PASSWORD|TOKEN' .; then
            echo "Warning: Potential secrets found. Review required."
          else
            echo "No obvious secrets found."
          fi

  desktop-build:
    name: Desktop Hub (Node)
    if: ${{ hashFiles('desktop/package.json') != '' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@2ef0dac24cb86bbd6f7c74ac031b5ac2c2089b8c  # v4

      - name: Setup Node.js
        uses: actions/setup-node@f7f5c5e565142bd362e52b4e4e7f98ab528cbb31  # v4
        with:
          node-version-file: .nvmrc
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: 'desktop/package-lock.json'

      - name: Install dependencies
        run: cd desktop && npm ci

      - name: Lint
        run: cd desktop && npm run lint

      - name: Test
        run: cd desktop && npm test

  android-build:
    name: Android Sensor
    if: ${{ hashFiles('**/gradlew') != '' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@2ef0dac24cb86bbd6f7c74ac031b5ac2c2089b8c  # v4

      - name: Set up JDK 17
        uses: actions/setup-java@fae39c5442bc39e562b8a980dac6e97be4c3fa60  # v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Cache Gradle packages
        uses: actions/cache@1e8e4d4b9632b4668ebb0c7fcc9a22b29c997c23  # v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Copy secrets template
        run: cp secrets.defaults.properties android/local.properties

      - name: Build and Test
        run: |
          cd android
          chmod +x gradlew
          ./gradlew lint testDebugUnitTest assembleDebug --no-daemon

# Guardrails: No deploy/merge/trigger jobs. No auto pushes. Only triggers on PRs or non-main branch pushes.
# All failures are surfaced for manual or permitted agent review only.
