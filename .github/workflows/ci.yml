name: Agent Guarded CI

"on":
  pull_request:
  push:
    branches-ignore:
      - main

permissions:
  contents: read
  security-events: write

jobs:
  nodejs:
    name: Node.js (via .nvmrc preferred, fallback 22.x)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Check for Node.js project files
        id: check_nodejs
        run: |
          if [ -f "desktop/package.json" ]; then
            echo "has_package_json=true" >> "$GITHUB_OUTPUT"
            if [ -f "desktop/package-lock.json" ]; then
              echo "Found desktop/package.json and desktop/package-lock.json; will use npm ci"
            else
              echo "Found desktop/package.json but no desktop/package-lock.json; will fall back to npm install"
            fi
          else
            echo "has_package_json=false" >> "$GITHUB_OUTPUT"
            echo "Skipping Node.js build: no desktop/package.json found"
          fi

      - name: Setup Node.js from .nvmrc or fallback
        if: steps.check_nodejs.outputs.has_package_json == 'true'
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version-file: .nvmrc
          node-version: 22.x
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - name: Show Node version
        if: steps.check_nodejs.outputs.has_package_json == 'true'
        run: node --version

      - name: Install dependencies
        if: steps.check_nodejs.outputs.has_package_json == 'true'
        working-directory: desktop
        run: |
          if [ -f "package-lock.json" ]; then
            echo "Using npm ci (package-lock.json found)"
            npm ci
          else
            echo "Using npm install (no package-lock.json found)"
            npm install
          fi

      - name: Lint
        if: steps.check_nodejs.outputs.has_package_json == 'true' && hashFiles('desktop/.eslintrc*', 'desktop/eslint.config.*') != ''
        working-directory: desktop
        run: npm run lint

      - name: Test
        if: steps.check_nodejs.outputs.has_package_json == 'true' && hashFiles('desktop/jest.config.*', 'desktop/**/*.test.[jt]s', 'desktop/**/*.spec.[jt]s') != ''
        working-directory: desktop
        run: npm test

  android:
    name: Android (JDK 17, Gradle)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout Code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Check for gradlew
        id: check_gradlew
        run: |
          if [ ! -f "android/gradlew" ]; then
            echo "Skipping Android build: android/gradlew not present"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up JDK 17
        if: steps.check_gradlew.outputs.skip != 'true'
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654
        with:
          distribution: temurin
          java-version: 17

      - name: Cache Gradle packages
        if: steps.check_gradlew.outputs.skip != 'true'
        uses: actions/cache@3b0346c531297cd300fe2e9edee4777ce94cf486
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('android/**/*.gradle*', 'android/**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Grant execute permission to gradlew
        if: steps.check_gradlew.outputs.skip != 'true'
        working-directory: android
        run: chmod +x ./gradlew

      - name: Android Unit Tests
        if: steps.check_gradlew.outputs.skip != 'true'
        working-directory: android
        run: ./gradlew :core:test

      - name: Android Build (assembleDebug)
        if: steps.check_gradlew.outputs.skip != 'true'
        working-directory: android
        run: ./gradlew assembleDebug

  secret-scan:
    name: Secret Scan (blocking)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Scan for accidental secrets
        run: |
          if grep -rIl \
            --exclude-dir=.git \
            --exclude-dir=.github \
            --exclude='*.example' \
            --exclude='secrets.defaults.*' \
            --exclude='SECRETS.md' \
            --exclude='SECURITY.md' \
            --exclude='KNOWN_ISSUES.md' \
            -E 'AKIA[0-9A-Z]{16}|AIzaSy[0-9A-Za-z_-]{33}|-----BEGIN (RSA |EC |OPENSSH )?PRIVATE KEY-----|-----BEGIN PGP PRIVATE KEY BLOCK-----|-----BEGIN (CERTIFICATE|X509 CERTIFICATE|TRUSTED CERTIFICATE)-----|ghp_[0-9A-Za-z]{36}|ghs_[0-9A-Za-z]{36}' \
            .; then
            echo "ERROR: Potential secrets detected. Review the files above before merging."
            exit 1
          else
            echo "No secrets detected."
          fi

# Guardrails: No deploy/merge/trigger jobs. No auto pushes.
# Only triggers on PRs or non-main branch pushes.
# All failures must be resolved before merging — see docs/AGENTS.md.
