name: wscan+ CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

# Cancel in-progress runs for the same PR
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  secrets-scan:
    name: Secret Scanning
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: TruffleHog OSS
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --debug --only-verified

  desktop-build:
    name: Desktop Hub (Node)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'desktop/package-lock.json'
      - name: Install & Lint & Test
        run: |
          if [ -d "desktop" ]; then
            cd desktop
            npm ci
            npm run lint --if-present
            npm test --if-present
          else
            echo "Desktop directory not found. Skipping build."
          fi

  android-build:
    name: Android Sensor
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle
      - name: Copy Secrets Template
        run: cp secrets.defaults.properties local.properties || true
      - name: Build and Test
        run: |
          if [ -d "android" ]; then
            cd android
            chmod +x gradlew
            ./gradlew lint testDebugUnitTest assembleDebug --no-daemon
          else
            echo "Android directory not found. Skipping build."
          fi
